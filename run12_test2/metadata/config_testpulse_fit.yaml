input:
  data_root: /Users/grams/run/run12/mockdata/vata/data
  file_name: outfile00001_000.root
  tree: vatatree

  # null means scan all date/time directories that contain file_name.
  date_dirs: [20251001]
  time_ids:
    - "0124_04"
    - "0132_24"
    - "0133_40"
    - "0138_47"
    - "0154_02"
    - "0155_42"
    - "0156_57"
    - "0207_53"
    - "0213_23"
    - "0217_09"
    - "0234_38"
    - "0245_47"
    - "0247_07"

test_pulse:
  channel: 17
  ccal: 8
  fec_ids: [0, 1, 2, 3]

fit:
  histogram_min_adu: -50.0
  histogram_max_adu: 1000.0
  histogram_bin_width_adu: 1.0
  fit_window_adu: 6.0

quality:
  min_events: 100
  min_fit_entries: 50
  min_peak_count: 20
  peak_min_adu: 20.0
  peak_max_adu: 1000.0
  sigma_min_adu: 0.5
  sigma_max_adu: 50.0
  max_chi2_ndf: 5.0

output:
  outdir: ../products
  fits_csv: testpulse_fits.csv
  summary_csv: testpulse_data.csv
  plot_dir: plots
  make_plots: true

review:
  # The GUI also uses this file for click-by-click review state.
  # For batch review, true means the first run creates manual_selection.csv
  # and review images. Fill use_fit with 1/0, then rerun to create the final
  # summary CSV.
  use_manual_selection: true
  selection_csv: manual_selection.csv
  plot_dir: review_plots
